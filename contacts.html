<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — HYGIENE</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- GSAP & Plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="style.css?v=4">
    <script src="components.js?v=2"></script>
    <style>
        .contacts-main .page-hero {
            padding: 220px 0 60px;
        }
        @media (max-width: 992px) {
            .contacts-main .page-hero {
                padding: 180px 0 60px !important;
            }
        }
    </style>
</head>

<body>

    <!-- Header / Navbar -->
    <app-header></app-header>

    <main class="contacts-main"
        style="background: transparent; padding-bottom: 80px; position: relative; overflow: hidden;">
        <!-- Background Elements -->
        <div class="bg-blur-circle" style="top: -10%; left: -10%; background: rgba(36, 139, 101, 0.05);"></div>
        <div class="bg-blur-circle" style="bottom: 10%; right: -5%; background: rgba(36, 139, 101, 0.03);"></div>

        <!-- Clean Hero -->
        <section class="page-hero" style="position: relative; z-index: 2;">
            <div class="container animate-up">
                <h1 class="page-title" data-i18n="cont_hero_title"
                    style="font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 20px; line-height: 1.1; color: var(--primary); font-family: 'Outfit', sans-serif; font-weight: 700;">
                    Остались вопросы?<br>Свяжитесь с нами
                </h1>
            </div>
        </section>

        <!-- Split Layout Section -->
        <section class="contacts-content" style="padding-top: 0; position: relative; z-index: 2;">
            <div class="container">
                <div class="contacts-wrapper animate-up"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: stretch;">

                    <!-- Left: Details and Form -->
                    <div class="contacts-left">
                        <div class="glass-card"
                            style="padding: 40px; height: 100%; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.6);">
                            <div style="margin-bottom: 35px;">
                                <h3 data-i18n="cont_office_tag"
                                    style="font-size: 14px; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">
                                    ГОЛОВНОЙ ОФИС</h3>
                                <h2 data-i18n="cont_office_name"
                                    style="font-size: 32px; line-height: 1.2; margin-bottom: 15px; font-family: 'Outfit', sans-serif; color: var(--text-dark);">
                                    ООО «HYGIENE»</h2>
                                <p data-i18n="cont_office_addr"
                                    style="font-size: 15px; color: var(--text-gray); line-height: 1.6; max-width: 420px;">
                                    Узбекистан, Ташкентская обл.,<br>Янгиюльский р-н, улица Навруз, 93
                                </p>
                            </div>

                            <div class="info-grid"
                                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px;">
                                <div class="info-box-v2"
                                    style="display: flex; align-items: center; gap: 15px; padding: 20px; background: rgba(255,255,255,0.5); border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); transition: all 0.3s;">
                                    <div class="info-icon"
                                        style="width: 48px; height: 48px; background: rgba(36,139,101,0.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0;">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <path
                                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                            </path>
                                        </svg>
                                    </div>
                                    <div class="info-text">
                                        <p data-i18n="cont_phone"
                                            style="font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; font-weight: 600;">
                                            Телефон</p>
                                        <a href="tel:+998993291720"
                                            style="display: block; font-size: 16px; font-weight: 600; color: var(--text-dark); white-space: nowrap; text-decoration: none;">+998 99 329 17 20</a>
                                        <a href="tel:+998917837380"
                                            style="display: block; font-size: 16px; font-weight: 600; color: var(--text-dark); white-space: nowrap; text-decoration: none; margin-top: 2px;">+998 91 783 73 80</a>
                                    </div>
                                </div>
                                <a href="mailto:hygieneuz@mail.ru" class="info-box-v2"
                                    style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; padding: 20px; background: rgba(255,255,255,0.5); border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); transition: all 0.3s;">
                                    <div class="info-icon"
                                        style="width: 48px; height: 48px; background: rgba(36,139,101,0.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0;">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <path
                                                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                            </path>
                                            <polyline points="22,6 12,13 2,6"></polyline>
                                        </svg>
                                    </div>
                                    <div class="info-text">
                                        <p data-i18n="cont_email"
                                            style="font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; font-weight: 600;">
                                            Почта</p>
                                        <span
                                            style="font-size: 16px; font-weight: 600; color: var(--text-dark); white-space: nowrap;">hygieneuz@mail.ru</span>
                                    </div>
                                </a>
                                <a href="https://t.me/OOO_HYGIENE" target="_blank" class="info-box-v2"
                                    style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; padding: 20px; background: rgba(255,255,255,0.5); border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); transition: all 0.3s;">
                                    <div class="info-icon"
                                        style="width: 48px; height: 48px; background: rgba(36,139,101,0.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0;">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                    </div>
                                    <div class="info-text">
                                        <p style="font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; font-weight: 600;">
                                            Telegram</p>
                                        <span
                                            style="font-size: 16px; font-weight: 600; color: var(--text-dark); white-space: nowrap;">@OOO_HYGIENE</span>
                                    </div>
                                </a>
                            </div>

                            <div style="margin-top: auto;">
                                <h3 data-i18n="cont_form_title"
                                    style="font-size: 22px; margin-bottom: 25px; font-family: 'Outfit', sans-serif; font-weight: 600;">
                                    Напишите нам</h3>
                                <form class="modern-form" id="contact-form">
                                    <!-- Honeypot anti-spam field -->
                                    <div style="display:none; visibility:hidden; position:absolute; left:-9999px;" aria-hidden="true">
                                        <input type="text" id="form-honeypot" name="website" tabindex="-1" autocomplete="off">
                                    </div>

                                    <div class="form-grid"
                                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                                        <div class="input-wrap">
                                            <input type="text" id="form-name" data-i18n-placeholder="form_name"
                                                placeholder="Ваше имя" required
                                                style="width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8); font-size: 15px; outline: none; transition: all 0.3s;">
                                        </div>
                                        <div class="input-wrap">
                                            <input type="text" id="form-contact" data-i18n-placeholder="form_email"
                                                placeholder="Email или Телефон" required
                                                style="width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8); font-size: 15px; outline: none; transition: all 0.3s;">
                                        </div>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 15px;">
                                        <textarea id="form-message" data-i18n-placeholder="form_msg"
                                            placeholder="Как мы можем вам помочь?" rows="4" required
                                            style="width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8); font-size: 15px; outline: none; transition: all 0.3s; resize: none;"></textarea>
                                    </div>

                                    <div class="form-group"
                                        style="margin-bottom: 25px; display: flex; align-items: flex-start; gap: 12px;">
                                        <input type="checkbox" id="form-consent"
                                            style="width: 18px; height: 18px; margin-top: 3px; cursor: pointer; accent-color: var(--primary);">
                                        <label for="form-consent" data-i18n="form_consent"
                                            style="font-size: 13px; color: var(--text-gray); line-height: 1.4; cursor: pointer; user-select: none;">
                                            Я согласен на обработку персональных данных
                                        </label>
                                    </div>

                                    <button type="submit" id="submit-btn"
                                        class="btn btn-premium-animated pulse-btn w-full" disabled
                                        style="padding: 16px; border-radius: 12px; font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; opacity: 0.5; cursor: not-allowed; transition: all 0.4s ease; background: var(--text-gray);">
                                        <span data-i18n="cont_form_btn">Отправить запрос</span>
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <line x1="22" y1="2" x2="11" y2="13"></line>
                                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                        </svg>
                                    </button>
                                </form>

                                <script>
                                    document.addEventListener('DOMContentLoaded', function () {
                                        const form = document.getElementById('contact-form');
                                        const inputs = form.querySelectorAll('input[required], textarea[required]');
                                        const checkbox = document.getElementById('form-consent');
                                        const btn = document.getElementById('submit-btn');

                                        // Record page load time for anti-spam speed check
                                        const pageLoadTime = Date.now();

                                        function validate() {
                                            let allFilled = true;
                                            inputs.forEach(input => {
                                                if (!input.value.trim()) allFilled = false;
                                            });

                                            if (allFilled && checkbox.checked) {
                                                btn.disabled = false;
                                                btn.style.opacity = '1';
                                                btn.style.cursor = 'pointer';
                                                btn.style.background = 'var(--primary)';
                                                btn.classList.add('pulse-btn');
                                            } else {
                                                btn.disabled = true;
                                                btn.style.opacity = '0.5';
                                                btn.style.cursor = 'not-allowed';
                                                btn.style.background = '#888';
                                                btn.classList.remove('pulse-btn');
                                            }
                                        }

                                        inputs.forEach(input => {
                                            input.addEventListener('input', validate);
                                        });
                                        checkbox.addEventListener('change', validate);

                                        // Form Submission Handler
                                        form.addEventListener('submit', function (e) {
                                            e.preventDefault();

                                            // 1. Honeypot check
                                            const honeypot = document.getElementById('form-honeypot').value;

                                            // 2. Time-to-Submit check (must take at least 4 seconds)
                                            const submitDuration = Date.now() - pageLoadTime;

                                            // 3. Cooldown rate-limit check (60 seconds)
                                            const lastSubmit = localStorage.getItem('contact_submit_cooldown');
                                            const now = Date.now();
                                            const cooldownPeriod = 60000;

                                            const currentLang = localStorage.getItem('hygiene_lang') || 'ru';

                                            if (lastSubmit && (now - lastSubmit < cooldownPeriod)) {
                                                const remainingSec = Math.ceil((cooldownPeriod - (now - lastSubmit)) / 1000);
                                                let cooldownMsg = (window.translations && translations[currentLang] && translations[currentLang]['spam_cooldown'])
                                                    || 'Пожалуйста, подождите {sec} сек. перед повторной отправкой.';
                                                cooldownMsg = cooldownMsg.replace('{sec}', remainingSec);
                                                showNotification(cooldownMsg, 'error');
                                                return;
                                            }

                                            // Honeypot or rapid submission detected - mock successful response silently to waste bot resources
                                            if (honeypot.trim() !== '' || submitDuration < 4000) {
                                                console.warn('Spam detected. Mocking response.');

                                                // Loading animation style mock
                                                const originalHTML = btn.innerHTML;
                                                btn.disabled = true;
                                                btn.style.opacity = '0.7';
                                                btn.style.cursor = 'wait';
                                                btn.style.background = '#888';
                                                btn.classList.remove('pulse-btn');
                                                btn.innerHTML = '<span>Отправка...</span>';

                                                setTimeout(() => {
                                                    const successMsg = (window.translations && translations[currentLang] && translations[currentLang]['contact_success'])
                                                        || 'Сообщение успешно отправлено!';
                                                    showNotification(successMsg, 'success');
                                                    form.reset();
                                                    btn.innerHTML = originalHTML;
                                                    validate();
                                                }, 1000);
                                                return;
                                            }

                                            // Telegram Bot settings
                                            const BOT_TOKEN = '8818603754:AAGvovarMYn9wxpQfQYa6APYRIs3ri5ruvU';
                                            const CHAT_ID = '5429947092';

                                            const name = document.getElementById('form-name').value.trim();
                                            const contact = document.getElementById('form-contact').value.trim();
                                            const message = document.getElementById('form-message').value.trim();

                                            const textMessage = `📩 *Новый запрос с сайта HYGIENE*\n\n` +
                                                `👤 *Имя:* ${name}\n` +
                                                `📞 *Контакты:* ${contact}\n` +
                                                `💬 *Сообщение:* ${message}`;

                                            // Loading State
                                            const originalHTML = btn.innerHTML;
                                            btn.disabled = true;
                                            btn.style.opacity = '0.7';
                                            btn.style.cursor = 'wait';
                                            btn.style.background = '#888';
                                            btn.classList.remove('pulse-btn');
                                            btn.innerHTML = '<span>Отправка...</span>';

                                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                                                method: 'POST',
                                                headers: {
                                                    'Content-Type': 'application/json'
                                                },
                                                body: JSON.stringify({
                                                    chat_id: CHAT_ID,
                                                    text: textMessage,
                                                    parse_mode: 'Markdown'
                                                })
                                            })
                                                .then(response => {
                                                    if (response.ok) {
                                                        const successMsg = (window.translations && translations[currentLang] && translations[currentLang]['contact_success'])
                                                            || 'Сообщение успешно отправлено!';
                                                        showNotification(successMsg, 'success');
                                                        form.reset();
                                                        localStorage.setItem('contact_submit_cooldown', Date.now());
                                                    } else {
                                                        throw new Error('Telegram API error');
                                                    }
                                                })
                                                .catch(err => {
                                                    console.error(err);
                                                    const errorMsg = (window.translations && translations[currentLang] && translations[currentLang]['contact_error'])
                                                        || 'Ошибка при отправке. Попробуйте еще раз.';
                                                    showNotification(errorMsg, 'error');
                                                })
                                                .finally(() => {
                                                    btn.innerHTML = originalHTML;
                                                    validate();
                                                });
                                        });

                                        function showNotification(text, type = 'success') {
                                            let toast = document.createElement('div');
                                            toast.style.position = 'fixed';
                                            toast.style.bottom = '30px';
                                            toast.style.right = '30px';
                                            toast.style.zIndex = '100000';
                                            toast.style.padding = '15px 25px';
                                            toast.style.borderRadius = '12px';
                                            toast.style.background = type === 'success' ? 'rgba(36, 139, 101, 0.95)' : 'rgba(239, 68, 68, 0.95)';
                                            toast.style.color = '#fff';
                                            toast.style.fontFamily = "'Inter', sans-serif";
                                            toast.style.fontSize = '14px';
                                            toast.style.fontWeight = '500';
                                            toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.15)';
                                            toast.style.backdropFilter = 'blur(10px)';
                                            toast.style.webkitBackdropFilter = 'blur(10px)';
                                            toast.style.border = '1px solid rgba(255,255,255,0.2)';
                                            toast.style.transform = 'translateY(50px) scale(0.9)';
                                            toast.style.opacity = '0';
                                            toast.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

                                            toast.innerText = text;
                                            document.body.appendChild(toast);

                                            // Force reflow
                                            toast.offsetHeight;
                                            toast.style.transform = 'translateY(0) scale(1)';
                                            toast.style.opacity = '1';

                                            setTimeout(() => {
                                                toast.style.transform = 'translateY(-20px) scale(0.9)';
                                                toast.style.opacity = '0';
                                                setTimeout(() => {
                                                    toast.remove();
                                                }, 400);
                                            }, 3000);
                                        }

                                        // Initial call
                                        validate();
                                    });
                                </script>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Map Window -->
                    <div class="contacts-right">
                        <div class="glass-card"
                            style="padding: 15px; height: 100%; min-height: 500px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.6); overflow: hidden;">
                            <div class="map-container"
                                style="flex-grow: 1; position: relative; border-radius: 12px; overflow: hidden; background: #eee;">
                                <!-- Yandex Map -->
                                <iframe id="map-yandex" class="map-view active"
                                    src="https://yandex.ru/map-widget/v1/?ll=69.034320%2C41.120163&z=17&pt=69.034320%2C41.120163,pm2rdm"
                                    width="100%" height="100%" frameborder="0" allowfullscreen="true" loading="lazy"
                                    referrerpolicy="no-referrer-when-downgrade"
                                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <app-footer></app-footer>

    <script src="translations.js"></script>
    <script src="main.js"></script>
</body>

</html>
