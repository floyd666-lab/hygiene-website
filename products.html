<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYGIENE — Наша Продукция</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css?v=2">
    <script src="components.js?v=2"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <app-header></app-header>

    <!-- Premium Category Navigation -->
    <section class="category-nav">
        <div class="category-nav-container">
            <button class="cat-nav-btn active" data-cat="wipes">
                <span data-i18n="cat_wet">Влажные салфетки</span>
            </button>
            <!-- 
            <button class="cat-nav-btn" data-cat="pads">
                <span data-i18n="cat_pads">Прокладки</span>
            </button>
            <button class="cat-nav-btn" data-cat="paper">
                <span data-i18n="cat_paper">Бумажные изделия</span>
            </button>
            <button class="cat-nav-btn" data-cat="dry">
                <span data-i18n="cat_dry">Сухие салфетки</span>
            </button>
            <button class="cat-nav-btn" data-cat="glass">
                <span data-i18n="cat_glass">Стеклоочеститель</span>
            </button>
            <button class="cat-nav-btn" data-cat="antiseptic">
                <span data-i18n="cat_antiseptics">Антисептики</span>
            </button>
            -->
        </div>
    </section>

    <!-- Big Brand Selection Bar -->
    <section class="brand-bar">
        <div class="brand-bar-container expanded">
            <button class="brand-sw-btn" data-filter="eco">
                <img src="assets/logo-eco.webp" alt="ECO" class="brand-logo-img">
            </button>
            <button class="brand-sw-btn" data-filter="bloomy">
                <img src="assets/logo-bloomy.webp" alt="Bloomy" class="brand-logo-img">
            </button>
        </div>
    </section>


    <main class="fullpage-catalog-viewport" style="display: none; opacity: 0; min-height: 80vh; padding: 40px 20px;">
        <!-- Coming Soon Overlay -->
        <div id="coming-soon" class="coming-soon-overlay" style="opacity: 0; pointer-events: none;">
            <div class="cs-content">
                <span class="cs-icon">✨</span>
                <h2 class="cs-title" data-i18n="cs_title">Скоро в продаже</h2>
                <p class="cs-text" data-i18n="cs_text">Данный раздел находится в разработке. Товары будут добавлены в ближайшее время.</p>
                <button class="cs-back-btn" data-i18n="cs_back_btn">Вернуться к салфеткам</button>
            </div>
        </div>

        <!-- Main Catalog Container -->
        <div class="catalog-main-content" id="catalog-main-content">
            <!-- Tabs for Packs -->
            <div class="catalog-pack-tabs" id="catalog-pack-tabs">
                <!-- Populated via JS -->
            </div>

            <!-- Full-width Staggered Grid for Products -->
            <div class="catalog-full-grid" id="catalog-full-grid">
                <!-- Populated via JS -->
            </div>
        </div>

    </main>
    
    <!-- Detailed Product Modal -->
    <div class="product-modal-overlay" id="product-modal" style="display: none; opacity: 0; pointer-events: none;">
        <div class="product-modal-content">
            <button class="modal-close-btn" id="btn-close-modal"><i data-lucide="x"></i></button>
            <div class="modal-left">
                <img src="" id="modal-img" alt="Product">
            </div>
            <div class="modal-right">
                <h2 id="modal-title">Product Title</h2>
                <div class="modal-tags" id="modal-tags"></div>
                <p class="modal-desc" id="modal-desc">Краткое описание товара.</p>
                
                <p class="ca-spec" id="modal-spec-pack" style="font-weight: 600; color: var(--primary); margin-top: -10px; margin-bottom: 20px;">Pack Info</p>
                
                <div class="modal-specs-wrap">
                    <h4 data-i18n="modal_specs_title">Характеристики:</h4>
                    <ul class="modal-specs" id="modal-specs-list">
                        <!-- Populated via JS -->
                    </ul>
                </div>
                
                <button class="btn btn-primary" data-i18n="btn_request_price" style="margin-top: 30px; width: 100%;">Запросить прайс</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <app-footer></app-footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="translations.js?v=2"></script>
    <script src="main.js?v=2"></script>
</body>

</html>
